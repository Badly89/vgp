services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vgp-backend
    restart: always
    environment:
      DTABLE_API_TOKEN: ${DTABLE_API_TOKEN}
      DTABLE_BASE_UUID: ${DTABLE_BASE_UUID}
      DTABLE_BASE_URL: ${DTABLE_BASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
    ports:
      - "8010:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vgp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vgp-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - vgp-network

  nginx:
    image: nginx:alpine
    container_name: vgp-nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # Монтируем сертификаты
    ports:
      - "80:80" # HTTP порт (будет перенаправлять)
      - "8443:443" # HTTPS порт
    depends_on:
      - frontend
      - backend
    networks:
      - vgp-network

networks:
  vgp-network:
    driver: bridge
